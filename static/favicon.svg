<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 -6 112 112" role="img" aria-label="Two dolphins circling like a yin-yang">
  <!-- One dolphin: a yin-yang half (body) plus dorsal fin, beak and tail flukes.
       The other dolphin is this same shape rotated 180°, so the pair tiles the disc. -->
  <g id="dolphin">
    <path d="M50,8 A42,42 0 0 0 50,92 A21,21 0 0 0 50,50 A21,21 0 0 1 50,8 Z"/>
    <path d="M6,41 Q-4,48 11,59 Q14,50 6,41 Z"/>
  </g>
  <use href="#dolphin" fill="#2e4a60"/>
  <use href="#dolphin" fill="#8fb7d2" transform="rotate(180 50 50)"/>
  <circle cx="50" cy="29" r="4.5" fill="#2e4a60"/>
  <circle cx="50" cy="71" r="4.5" fill="#8fb7d2"/>
</svg>
